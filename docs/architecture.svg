<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">printstack architecture</title>
  <desc id="desc">USB printers connect to a Raspberry Pi that exports them over USB/IP; an Incus container attaches them and serves printing via CUPS.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="piGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="srvGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="lanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f8fafc"/>
    </marker>
  </defs>

  <rect width="920" height="320" rx="18" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1">
    <path d="M0 80 H920 M0 160 H920 M0 240 H920"/>
    <path d="M184 0 V320 M368 0 V320 M552 0 V320 M736 0 V320"/>
  </g>

  <!-- USB printers -->
  <g transform="translate(48, 96)">
    <rect x="0" y="0" width="120" height="128" rx="14" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="24" y="22" width="72" height="44" rx="8" fill="#1f2937" stroke="#475569"/>
    <rect x="34" y="32" width="52" height="8" rx="2" fill="#64748b"/>
    <rect x="34" y="46" width="36" height="6" rx="2" fill="#475569"/>
    <rect x="18" y="78" width="84" height="34" rx="6" fill="#0f172a" stroke="#475569"/>
    <circle cx="30" cy="95" r="5" fill="#22c55e"/>
    <circle cx="46" cy="95" r="5" fill="#eab308"/>
    <circle cx="62" cy="95" r="5" fill="#38bdf8"/>
    <text x="60" y="148" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">USB printers</text>
  </g>

  <!-- cable -->
  <path d="M168 160 H208" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="208" cy="160" r="4" fill="#94a3b8"/>

  <!-- Raspberry Pi -->
  <g transform="translate(220, 72)" filter="url(#glow)">
    <rect x="0" y="0" width="168" height="176" rx="16" fill="#111827" stroke="url(#piGrad)" stroke-width="2.5"/>
    <rect x="18" y="18" width="132" height="92" rx="10" fill="url(#piGrad)" opacity="0.18"/>
    <rect x="34" y="34" width="100" height="60" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <text x="84" y="58" text-anchor="middle" fill="#bbf7d0" font-family="ui-monospace, monospace" font-size="11" font-weight="700">usbipd</text>
    <text x="84" y="76" text-anchor="middle" fill="#86efac" font-family="ui-monospace, monospace" font-size="10">TCP 3240</text>
    <rect x="34" y="122" width="100" height="28" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="84" y="140" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">pi-bootstrap.sh</text>
    <text x="84" y="198" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">Raspberry Pi 4B</text>
    <text x="84" y="216" text-anchor="middle" fill="#86efac" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">USB/IP proxy</text>
  </g>

  <!-- LAN -->
  <g transform="translate(410, 138)">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <rect x="8" y="8" width="164" height="28" rx="14" fill="url(#lanGrad)" opacity="0.25"/>
    <text x="90" y="28" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="3">LAN</text>
    <path d="M0 22 H-24" stroke="#f8fafc" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M180 22 H204" stroke="#f8fafc" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Incus / CUPS -->
  <g transform="translate(624, 56)" filter="url(#glow)">
    <rect x="0" y="0" width="248" height="208" rx="16" fill="#111827" stroke="url(#srvGrad)" stroke-width="2.5"/>
    <rect x="18" y="18" width="212" height="108" rx="12" fill="url(#srvGrad)" opacity="0.15"/>
    <rect x="34" y="34" width="180" height="44" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="124" y="54" text-anchor="middle" fill="#bae6fd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700">CUPS</text>
    <text x="124" y="70" text-anchor="middle" fill="#7dd3fc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">IPP / Bonjour / optional TLS</text>
    <rect x="34" y="88" width="88" height="24" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="78" y="104" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="9">usbip attach</text>
    <rect x="126" y="88" width="88" height="24" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="170" y="104" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="9">nginx :443</text>
    <rect x="34" y="138" width="180" height="28" rx="6" fill="#0f172a" stroke="#334155"/>
    <text x="124" y="156" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">printserver-bootstrap.sh</text>
    <text x="124" y="196" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">Incus LXC container</text>
    <text x="124" y="214" text-anchor="middle" fill="#7dd3fc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">print server</text>
  </g>

  <!-- footer tagline -->
  <text x="460" y="292" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" letter-spacing="1">plug printers in once -- print from anywhere on your LAN</text>
</svg>